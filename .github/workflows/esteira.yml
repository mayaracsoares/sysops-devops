name: esteira-mural

on: push

jobs:
    testes:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: "3.12"
                cache: "pip"
            - run: ls -R
            - run: pip install -r app/requirements.txt
            - run: PYTHONPATH=app python -m pytest -v

    imagem:
        needs: testes
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Buildar a imagem
              run: docker build -t mural:${{ github.sha }} .
            - name: Conferir o tamanho
              run: docker images mural
            - name: Teste de fumaca
              run: |
                docker run -d --name fumaca mural:${{ github.sha }}
                sleep 5
                docker ps --filter name=fumaca
                docker logs fumaca
