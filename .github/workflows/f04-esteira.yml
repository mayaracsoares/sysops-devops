name: Esteira de CI/CD - Mural

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
# job de testes (matrix)
    testes:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: f02_devops/04_containers/projeto
        strategy:
            matrix:
                python-version: ["3.11", "3.12"]
        steps:
            - uses: actions/checkout@v4

            - name: Configurar Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}

            - name: Instalar dependências
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Rodar testes
              run: python -m pytest

# job de qualidade ruff
    qualidade:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: f02_devops/04_containers/projeto
        steps:
          - uses: actions/checkout@v4

          - name: Configurar Python
            uses: actions/setup-python@v5
            with:
              python-version: "3.12"

          - name: Instalar Ruff
            run: pip install ruff

          - name: Executar Ruff check
            run: ruff check .

          - name: executar Ruff Format
            run: ruff format --check .

# job de build da imagem
    imagem:
        needs: [testes, qualidade]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
          - uses: actions/checkout@v4

          - name: Login no GHCR
            run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          - name: Repo name
            run: echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

          - name: Build e push
            run: |
              docker build -t ghcr.io/${{ env.REPO_NAME }}:${{ github.sha }} f02_devops/04_containers/projeto
              docker push ghcr.io/${{ env.REPO_NAME }}:${{ github.sha }}

# job de deploy
    deploy:
      needs: imagem
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      permissions:
        pages: write
        id-token: write
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      steps:
        - uses: actions/checkout@v4

        - name: Setup Pages
          uses: actions/configure-pages@v4

        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: './f02_devops/04_containers/site'

        - name: Deploy para Github Pages
          id: deployment
          uses: actions/deploy-pages@v4
